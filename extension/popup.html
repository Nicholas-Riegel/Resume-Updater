<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Resume Tailor</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            font-size: 13px;
            width: 360px;
            padding: 12px;
            margin: 0;
        }
        h2 {
            margin: 0 0 8px;
            font-size: 15px;
        }
        textarea {
            width: 100%;
            height: 180px;
            box-sizing: border-box;
            font-size: 12px;
            resize: vertical;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 6px;
        }
        button {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            font-size: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background: #aaa;
            cursor: default;
        }
        #status {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            min-height: 16px;
        }
        #status.error { color: #c00; }
    </style>
</head>
<body>
    <h2>Resume Tailor</h2>
    <textarea id="jobDescription" placeholder="Scraping job description…"></textarea>
    <button id="generateBtn" disabled>Generate Resume</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
